[project]
name = "olympus-hlc"
version = "0.1.0"
description = "Olympus High-Level Controller — HLC software para Raspberry Pi 5 (Yocto)"
requires-python = ">=3.11"

# Dependencias mínimas para correr olympus_controller.py en el RPi5.
# En la imagen Yocto estas las proveen las recetas python3-* del layer.
dependencies = []

[project.optional-dependencies]
# Herramientas de desarrollo y pruebas (corre en PC, no en RPi5)
dev = [
    "pytest>=8.0",
    "pytest-timeout>=2.3",
    "opencv-python>=4.9",   # debug_view.py — requiere display (no headless)
    "numpy>=1.26",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-timeout>=2.3",
    "opencv-python>=4.9",
    "numpy>=1.26",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
timeout = 30

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["olympus_hlc"]

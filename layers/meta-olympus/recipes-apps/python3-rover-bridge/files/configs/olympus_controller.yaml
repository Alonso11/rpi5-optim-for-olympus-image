# Olympus HLC — Configuración del controlador principal
# Version: v1.0
#
# Este archivo se instala en /etc/olympus/olympus_controller.yaml.
# Modificarlo en la RPi5 y reiniciar el servicio para aplicar cambios
# sin necesidad de recompilar la imagen Yocto.
#
# Si el archivo no existe o una clave está ausente, olympus_controller.py
# usa los valores por defecto definidos en el código (idénticos a los de abajo).

# ─── Comunicación LLC ────────────────────────────────────────────────────────
# Máximo intervalo entre comandos antes de enviar PING para mantener vivo
# el watchdog del Arduino (~2 s sin comando → FAULT automático).
ping_interval_s: 1.0

# Escalado de pérdida de enlace — tres niveles (SYS-FUN-021 / COMM-REQ-005):
#
#   tlm_warn_s    → advertencia de enlace degradado (sin acción de movimiento)
#   tlm_retreat_s → RET al último waypoint seguro registrado por WaypointTracker
#   tlm_stb_s     → STB definitivo si el enlace no se recupera tras el RET
#
# El SRS (SYS-FUN-021) exige RET a los 10 s de pérdida de enlace.
# tlm_warn_s < tlm_retreat_s < tlm_stb_s obligatorio.
tlm_warn_s:    5.0
tlm_retreat_s: 10.0
tlm_stb_s:     30.0

# Umbral de advertencia de ciclo lento en ms (RNF-001: ciclo ≤ 2000 ms).
cycle_warn_ms: 1500

# Cada cuántos ciclos escribir el tiempo de ciclo a DEBUG (reduce ruido en log).
cycle_log_period: 50

# ─── Navegación ──────────────────────────────────────────────────────────────
# Distancia táctica HLC en mm para iniciar RET de forma proactiva.
# Debe ser mayor que los umbrales de emergencia del LLC (HC-SR04: 200 mm,
# VL53L0X: 150 mm) para que el HLC actúe antes del FAULT hardware.
retreat_dist_mm: 300

# Número máximo de waypoints seguros a retener en memoria (SyRS-061).
max_waypoints: 5

# Número de frames TLM consecutivos con stall_mask != 0 en estado EXPLORE
# antes de forzar RET por detección de deslizamiento (RF-004).
# 2 frames × ~1 s/frame = reacción en ~2 s.
slip_stall_frames: 2

# ─── Temperatura (RNF-004) ───────────────────────────────────────────────────
# Sensor: LM335 en Arduino A6 (temperatura ambiente del chasis).
# El SRS exige operación ≤ 45 °C ambiente y chasis ≤ 60 °C.
# CALIBRAR EN CAMPO si el sensor tiene offset respecto a la temperatura real.
temp_warn_c: 45    # °C → advertencia al operador
temp_crit_c: 60    # °C → activa Safe Mode (RNF-004)

# ─── Almacenamiento (SRS-014) ─────────────────────────────────────────────────
# MB libres mínimos en /var/log antes de emitir advertencia de disco lleno.
# Estimado: ~2 h de logs ≈ 2–3 MB → 50 MB da margen amplio.
storage_min_mb: 50

# Cada cuántos ciclos verificar espacio en disco (evita syscall en cada ciclo).
# 300 ciclos × ~1 s/ciclo = verificación cada ~5 min.
storage_check_cycles: 300

# ─── Frecuencia TLM (SyRS-017) ───────────────────────────────────────────────
# Delta máximo entre frames TLM consecutivos antes de advertir.
# El Arduino emite TLM cada ~1 s. Un delta > 2 s sugiere degradación de enlace.
tlm_interval_warn_s: 2.0

# ─── Batería — 4S Li-ion (EPS-REQ-001) ──────────────────────────────────────
# 3.5 V/celda × 4S = 14.0 V → nivel WARN, notificar al operador.
batt_warn_mv: 14000

# 3.2 V/celda × 4S = 12.8 V → nivel CRITICAL, forzar STB inmediato.
batt_critical_mv: 12800

# ─── Visión (modo --mode vision) ─────────────────────────────────────────────
frame_width: 640
frame_height: 480

# Confianza mínima de detección YOLOv8n para actuar sobre el resultado.
vision_conf_min: 0.5

# Área mínima del bounding box como fracción del frame para actuar.
# Evita reaccionar a objetos muy lejanos o falsos positivos pequeños.
vision_area_min: 0.05

# Zonas de decisión de evasión (fracciones de frame_width):
#   0 ─── zone_left_end ─── zone_right_start ─── 1
#       AVD:R              RET              AVD:L
#
# La cámara está centrada en el chasis y el rover usa tracción diferencial
# (giro en sitio), por lo que las zonas son simétricas al 33/67 %.
# Si la cámara se desplaza lateralmente, ajustar ambos valores en campo.
zone_left_end: 0.33
zone_right_start: 0.67

# Velocidades de exploración (rango -99–99; positivo = avance).
# Se aplican en ambos modos (bbox y segmentation) cuando no hay obstáculos.
# Dos valores independientes L/R permiten compensar deriva si un lado del
# chasis es sistemáticamente más rápido que el otro (variación de motores DC).
# Si el rover avanza recto con valores iguales, mantener exp_speed_l == exp_speed_r.
# CALIBRAR EN CAMPO: punto de partida conservador 40 (~40 % del máximo PWM).
exp_speed_l: 40
exp_speed_r: 40

# ─── Enlace GCS (modo --mode gcs, SRS-013 / SYS-FUN-021) ────────────────────
#
# Gestión del enlace UDP entre el GCS (laptop/operador) y el HLC (RPi5).
# Implementa la máquina de estados GCS descrita en §7.3.8 del SRS:
#   COMUNICAR      → enlace activo
#   GESTION_ENLACE → enlace perdido, ejecutando política de reintentos (TBD-OP-02)
#
# Puertos UDP:
#   gcs_listen_port — HLC escucha comandos CMD:<cmd> y heartbeats HB del GCS
#   gcs_reply_port  — HLC envía TLM downlink y probes HB_REQ al GCS
#   gcs_bind_addr   — dirección de escucha ("0.0.0.0" = todas las interfaces)
#
# La IP del GCS se aprende dinámicamente del primer paquete recibido;
# no es necesario configurarla aquí.
gcs_listen_port: 9000
gcs_reply_port:  9001
gcs_bind_addr:   "0.0.0.0"

# Tiempo sin paquetes del GCS antes de declarar link_lost (SYS-FUN-021).
# El SRS exige maniobra de retorno autónomo ante pérdida > 10 s.
# gcs_link_lost_s debe ser ≤ tlm_retreat_s para que la pérdida de enlace
# GCS dispare acciones antes (o al mismo tiempo) que la pérdida de TLM LLC.
gcs_link_lost_s: 10.0

# Intervalo entre probes HB_REQ enviados al GCS durante GESTION_ENLACE.
# Corresponde a TBD-OP-02 (política de reintentos) — valor provisional
# pendiente de caracterización de latencia WiFi en campo.
gcs_retry_interval_s: 5.0

# Número máximo de reintentos antes de forzar STB permanente.
# Si el GCS no responde tras gcs_max_retries × gcs_retry_interval_s segundos,
# el HLC asume pérdida total de enlace y detiene el rover indefinidamente
# hasta que llegue un nuevo paquete GCS.
# Corresponde a TBD-OP-02 — valor provisional.
gcs_max_retries: 3

# ─── Segmentación semántica — GNC-REQ-002 (modo vision_mode: segmentation) ───
#
# Modo de decisión visual:
#   "bbox"         — bounding box center (YOLOv8n). Referencia estable.
#   "segmentation" — máscara de píxeles (YOLOv8n-seg). Más preciso (GNC-REQ-002).
# Mantener "bbox" hasta verificar yolov8n-seg.onnx en hardware.
vision_mode: bbox

# Ruta al modelo YOLOv8n-seg exportado a ONNX (opset 12).
# Exportar con: yolo export model=yolov8n-seg.pt format=onnx imgsz=640 opset=12
seg_model_path: /usr/share/olympus/models/yolov8n-seg.onnx

# Confianza mínima de detección para el pipeline de segmentación.
# Valor inicial idéntico a vision_conf_min — ajustar en campo si hay
# demasiados falsos positivos o el modelo pierde obstáculos reales.
seg_conf_min: 0.5

# Fracción mínima del frame total que debe cubrir una máscara para que
# la detección sea considerada. Las máscaras de segmentación son más ajustadas
# que los bounding boxes (no incluyen espacio vacío interior del bbox), por lo
# que el umbral es ligeramente menor que vision_area_min (0.05).
# Ejemplo: 0.03 × 640×480 = ~9 200 px de máscara mínima.
seg_area_min: 0.03

# Fracción mínima de una zona (izquierda, centro o derecha) que debe estar
# cubierta por máscaras para activar el comando de evasión correspondiente.
# Evita reaccionar a ruido de segmentación o sombras pequeñas.
# Si múltiples zonas superan este umbral, gana la de mayor cobertura (Opción A).
# Ejemplo: 0.05 × (213 px × 240 px ROI) ≈ 2 556 px mínimos por zona.
seg_zone_min: 0.05

# Fracción vertical del frame a partir de la cual se evalúan las máscaras
# (0.0 = frame completo, 0.5 = solo mitad inferior).
# La mitad superior suele contener fondo lejano, cielo o paredes que no
# representan obstáculos inmediatos para el rover.
# Depende del ángulo de montaje de la cámara — CALIBRAR EN CAMPO.
# Con cámara horizontal: 0.5. Inclinada hacia abajo: bajar hacia 0.3.
seg_roi_top: 0.5
